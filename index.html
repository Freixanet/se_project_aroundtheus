<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Around The US</title>
    <link rel="stylesheet" href="/vendor/normalize.css" />
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="body">
    <div class="page">
      <header class="header">
        <img class="logo" src="./images/Vector5.svg" alt="Logo" />
      </header>
      <main class="main">
        <section class="profile">
          <img
            class="profile__image"
            src="./images/jacques-cousteau.jpg"
            alt=""
          />
          <div class="profile__title-wrapper">
            <h1 class="profile__title">Jacques Cousteau</h1>
            <p class="profile__text">Explorer</p>
            <img
              class="profile__edit-button"
              src="./images/edit-button.svg"
              alt=""
            />
          </div>
          <button class="profile__button">
            <img src="./images/Vector6.svg" alt="" />
          </button>
        </section>
        <section class="places">
          <div class="card">
            <img
              class="card__image"
              src="./images/yosemite-valley.jpg"
              alt=""
            />
            <div class="card__title-wrapper">
              <h2 class="card__title">Yosemite Valley</h2>
              <img
                class="card__like-button"
                src="./images/Vector7.svg"
                alt=""
              />
            </div>
          </div>
          <div class="card">
            <img class="card__image" src="./images/lake-louise.jpg" alt="" />
            <div class="card__title-wrapper">
              <h2 class="card__title">Lake Louise</h2>
              <img
                class="card__like-button"
                src="./images/Vector7.svg"
                alt=""
              />
            </div>
          </div>
          <div class="card">
            <img class="card__image" src="./images/bald-mountains.jpg" alt="" />
            <div class="card__title-wrapper">
              <h2 class="card__title">Bald Mountains</h2>
              <img
                class="card__like-button"
                src="./images/Vector7.svg"
                alt=""
              />
            </div>
          </div>
          <div class="card">
            <img class="card__image" src="./images/latemar.jpg" alt="" />
            <div class="card__title-wrapper">
              <h2 class="card__title">Latemar</h2>
              <img
                class="card__like-button"
                src="./images/Vector7.svg"
                alt=""
              />
            </div>
          </div>
          <div class="card">
            <img
              class="card__image"
              src="./images/vanoise-national-park.jpg"
              alt=""
            />
            <div class="card__title-wrapper">
              <h2 class="card__title">Vanoise National Park</h2>
              <img
                class="card__like-button"
                src="./images/Vector7.svg"
                alt=""
              />
            </div>
          </div>
          <div class="card">
            <img class="card__image" src="./images/lago-di-braies.jpg" alt="" />
            <div class="card__title-wrapper">
              <h2 class="card__title">Lago di Braies</h2>
              <img
                class="card__like-button"
                src="./images/Vector7.svg"
                alt=""
              />
            </div>
          </div>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__copyright">© 2022 Around The U.S.</p>
      </footer>
    </div>
  </body>
</html>
