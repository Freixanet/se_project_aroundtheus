<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Around The US</title>
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./pages/index.css" />
  </head>
  <body class="body">
    <div class="page">
      <header class="header">
        <img class="logo" src="./images/Vector5.svg" alt="Logo" />
      </header>
      <main class="main">
        <section class="profile">
          <img
            class="profile__image"
            src="./images/jacques-cousteau.jpg"
            alt="Profile image"
          />
          <div class="profile__title-wrapper">
            <h1 class="profile__title">Jacques Cousteau</h1>
            <p class="profile__text">Explorer</p>
            <button class="profile__edit-button" type="button">
              <img
                class="profile__edit-button-icon"
                src="./images/edit-button.svg"
                alt="Edit button"
              />
            </button>
          </div>
          <button class="profile__button" type="button">
            <img src="./images/Vector6.svg" alt="Profile button" />
          </button>
        </section>
        <section class="places">
          <div class="card">
            <img
              class="card__image"
              src="./images/yosemite-valley.jpg"
              alt="Yosemite Valley image"
            />
            <div class="card__title-wrapper">
              <h2 class="card__title">Yosemite Valley</h2>
              <button class="card__like-button">
                <img
                  class="card__like-button-icon"
                  src="./images/Vector7.svg"
                  alt="Like button"
                />
              </button>
            </div>
          </div>
          <div class="card">
            <img
              class="card__image"
              src="./images/lake-louise.jpg"
              alt="Lake Louise image"
            />
            <div class="card__title-wrapper">
              <h2 class="card__title">Lake Louise</h2>
              <button class="card__like-button">
                <img
                  class="card__like-button-image"
                  src="./images/Vector7.svg"
                  alt="Like button"
                />
              </button>
            </div>
          </div>
          <div class="card">
            <img
              class="card__image"
              src="./images/bald-mountains.jpg"
              alt="Bald Mountains image"
            />
            <div class="card__title-wrapper">
              <h2 class="card__title">Bald Mountains</h2>
              <button class="card__like-button">
                <img
                  class="card__like-button-image"
                  src="./images/Vector7.svg"
                  alt="Like button"
                />
              </button>
            </div>
          </div>
          <div class="card">
            <img
              class="card__image"
              src="./images/latemar.jpg"
              alt="Latemar image"
            />
            <div class="card__title-wrapper">
              <h2 class="card__title">Latemar</h2>
              <button class="card__like-button">
                <img
                  class="card__like-button-image"
                  src="./images/Vector7.svg"
                  alt="Like button"
                />
              </button>
            </div>
          </div>
          <div class="card">
            <img
              class="card__image"
              src="./images/vanoise-national-park.jpg"
              alt="Vanoise National Park image"
            />
            <div class="card__title-wrapper">
              <h2 class="card__title">Vanoise National Park</h2>
              <button class="card__like-button">
                <img
                  class="card__like-button-image"
                  src="./images/Vector7.svg"
                  alt="Like button"
                />
              </button>
            </div>
          </div>
          <div class="card">
            <img
              class="card__image"
              src="./images/lago-di-braies.jpg"
              alt="Lago di Braies image"
            />
            <div class="card__title-wrapper">
              <h2 class="card__title">Lago di Braies</h2>
              <button class="card__like-button">
                <img
                  class="card__like-button-image"
                  src="./images/Vector7.svg"
                  alt="Like button"
                />
              </button>
            </div>
          </div>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__copyright">© 2022 Around The U.S.</p>
      </footer>
    </div>
  </body>
</html>
