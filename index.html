<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Around The US</title>
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./pages/index.css" />
  </head>
  <body class="body">
    <div class="page">
      <header class="header">
        <img class="logo" src="./images/Vector5.svg" alt="Logo" />
      </header>
      <main class="main">
        <section class="profile">
          <img
            class="profile__image"
            src="./images/jacques-cousteau.jpg"
            alt="Profile image"
          />
          <div class="profile__title-wrapper">
            <h1 class="profile__title">Jacques Cousteau</h1>
            <p class="profile__text">Explorer</p>
            <button class="profile__edit-button" type="button"></button>
          </div>
          <button class="profile__button" type="button"></button>
        </section>
        <section class="places"></section>
      </main>
      <footer class="footer">
        <p class="footer__copyright">© 2022 Around The U.S.</p>
      </footer>
      <!-- MODAL -->
      <div class="modal">
        <div class="modal__content">
          <button class="modal__close-button"></button>
          <h2 class="modal__title">Edit Profile</h2>
          <form action="text" class="modal__form">
            <div class="modal__fieldset-wrapper">
              <fieldset class="modal__fieldset">
                <input
                  type="text"
                  placeholder="Name"
                  class="modal__input modal__input-name"
                  required
                />
              </fieldset>
              <fieldset class="modal__fieldset">
                <input
                  type="text"
                  placeholder="Description"
                  class="modal__input modal__input-description"
                  required
                />
              </fieldset>
            </div>
            <button type="submit" class="modal__save-button">Save</button>
          </form>
        </div>
      </div>
      <!-- MODAL -->
    </div>
    <!-- TEMPLATE -->
    <template id="card-template">
      <div class="card">
        <div class="card__image"></div>
        <div class="card__title-wrapper">
          <h2 class="card__title"></h2>
          <button class="card__like-button" type="button"></button>
        </div>
      </div>
    </template>

    <script src="./scripts/index.js"></script>
  </body>
</html>
